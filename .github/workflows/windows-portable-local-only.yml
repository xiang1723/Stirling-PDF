name: Build Windows Portable (Local-Only)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-portable:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          toolchain: stable

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@f29f5a9d7b09a7c6b29859002d29d24e1674c884 # v5.0.1
        with:
          gradle-version: 8.14

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Diagnostics before build
        shell: pwsh
        run: |
          Write-Host "Workspace: $pwd"
          Get-Item scripts/build-windows-portable-local-only.bat | Format-List FullName,Length,LastWriteTime
          Get-Item scripts/check-windows-portable-prereqs.bat | Format-List FullName,Length,LastWriteTime
          node --version
          npm --version
          rustc --version
          cargo --version
          java --version

      - name: Build Windows portable package (local-only)
        shell: pwsh
        run: |
          cmd /c "call scripts\check-windows-portable-prereqs.bat"
          if ($LASTEXITCODE -ne 0) {
            throw "Prerequisite check failed with exit code $LASTEXITCODE"
          }

          cmd /c "call scripts\build-windows-portable-local-only.bat"
          if ($LASTEXITCODE -ne 0) {
            throw "Portable build failed with exit code $LASTEXITCODE"
          }

      - name: Verify portable artifact
        shell: pwsh
        run: |
          $zip = "frontend/src-tauri/target/portable/Stirling-PDF-portable.zip"
          if (!(Test-Path $zip)) {
            Write-Error "Portable zip not found: $zip"
          }
          Get-Item $zip | Format-List FullName,Length,LastWriteTime

      - name: Upload portable artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: Stirling-PDF-portable-local-only-windows-x86_64
          path: frontend/src-tauri/target/portable/Stirling-PDF-portable.zip
          if-no-files-found: error
